services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AIML_API_KEY: ${AIML_API_KEY:-}
      AIML_MODE: ${AIML_MODE:-mock}
      BAND_MODE: ${BAND_MODE:-mock}
      BAND_DEFAULT_ROOM_ID: ${BAND_DEFAULT_ROOM_ID:-}
      DEMO_MODE: ${DEMO_MODE:-mock}
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
      FEATHERLESS_MODE: ${FEATHERLESS_MODE:-mock}
      THENVOI_REST_URL: ${THENVOI_REST_URL:-https://app.band.ai/}
      THENVOI_WS_URL: ${THENVOI_WS_URL:-wss://app.band.ai/api/v1/socket/websocket}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
      - ./output:/app/output
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0
