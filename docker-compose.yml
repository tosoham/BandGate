services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AIML_API_KEY: ${AIML_API_KEY:-}
      AIML_BASE_URL: ${AIML_BASE_URL:-https://api.aimlapi.com/v1}
      AIML_ENABLED: ${AIML_ENABLED:-true}
      AIML_MODEL: ${AIML_MODEL:-google/gemini-2.5-flash}
      AIML_EMBEDDING_MODEL: ${AIML_EMBEDDING_MODEL:-text-embedding-3-large}
      # Per-task model routing (empty -> falls back to AIML_MODEL in code).
      AIML_REASONING_MODEL: ${AIML_REASONING_MODEL:-}
      AIML_SALES_MODEL: ${AIML_SALES_MODEL:-}
      AIML_NORMALIZE_MODEL: ${AIML_NORMALIZE_MODEL:-}
      AIML_INTAKE_RISK_MODEL: ${AIML_INTAKE_RISK_MODEL:-}
      AIML_DRIFT_MODEL: ${AIML_DRIFT_MODEL:-}
      AIML_REPORT_MODEL: ${AIML_REPORT_MODEL:-}
      AIML_RERANK_MODEL: ${AIML_RERANK_MODEL:-}
      AIML_MODE: ${AIML_MODE:-live}
      BANDGATE_BOOT_MODE: ${BANDGATE_BOOT_MODE:-lazy}
      AIML_NORMALIZE_LIVE_LIMIT: ${AIML_NORMALIZE_LIVE_LIMIT:-20}
      AIML_SALES_LIVE_LIMIT: ${AIML_SALES_LIVE_LIMIT:-30}
      AIML_DRIFT_LIVE_LIMIT: ${AIML_DRIFT_LIVE_LIMIT:-30}
      AIML_DRIFT_ENABLE_LIVE: ${AIML_DRIFT_ENABLE_LIVE:-false}
      AIML_DRIFT_SCAN_ALL: ${AIML_DRIFT_SCAN_ALL:-false}
      AIML_INTAKE_RISK_LIVE_LIMIT: ${AIML_INTAKE_RISK_LIVE_LIMIT:-30}
      AIML_REPORT_LIVE_LIMIT: ${AIML_REPORT_LIVE_LIMIT:-10}
      AIML_REASONING_LIVE_LIMIT: ${AIML_REASONING_LIVE_LIMIT:-200}
      AIML_EMBEDDING_LIVE_LIMIT: ${AIML_EMBEDDING_LIVE_LIMIT:-200}
      AIML_RERANK_LIVE_LIMIT: ${AIML_RERANK_LIVE_LIMIT:-200}
      BANDGATE_HUMAN_WAIT_SECONDS: ${BANDGATE_HUMAN_WAIT_SECONDS:-900}
      BAND_MODE: ${BAND_MODE:-lite}
      BAND_DEFAULT_ROOM_ID: ${BAND_DEFAULT_ROOM_ID:-}
      BAND_REST_URL: ${BAND_REST_URL:-https://app.band.ai/}
      BAND_WS_URL: ${BAND_WS_URL:-wss://app.band.ai/api/v1/socket/websocket}
      DEMO_MODE: ${DEMO_MODE:-lite}
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
      FEATHERLESS_BASE_URL: ${FEATHERLESS_BASE_URL:-https://api.featherless.ai/v1}
      FEATHERLESS_MODEL: ${FEATHERLESS_MODEL:-deepseek-ai/DeepSeek-V4-Pro}
      FEATHERLESS_MODE: ${FEATHERLESS_MODE:-lite}
      FEATHERLESS_REVIEW_LIVE_LIMIT: ${FEATHERLESS_REVIEW_LIVE_LIMIT:-30}
      THENVOI_REST_URL: ${THENVOI_REST_URL:-https://app.band.ai/}
      THENVOI_WS_URL: ${THENVOI_WS_URL:-wss://app.band.ai/api/v1/socket/websocket}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
      - ./output:/app/output
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev -- --hostname 0.0.0.0

  band-service:
    profiles: ["band"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AIML_ENABLED: ${AIML_ENABLED:-true}
      AIML_MODEL: ${AIML_MODEL:-google/gemma-3-4b-it}
      AIML_EMBEDDING_MODEL: ${AIML_EMBEDDING_MODEL:-text-embedding-3-small}
      AIML_API_KEY: ${AIML_API_KEY:-}
      AIML_BASE_URL: ${AIML_BASE_URL:-https://api.aimlapi.com/v1}
      AIML_MODE: ${AIML_MODE:-live}
      AIML_DRIFT_LIVE_LIMIT: ${AIML_DRIFT_LIVE_LIMIT:-30}
      AIML_DRIFT_ENABLE_LIVE: ${AIML_DRIFT_ENABLE_LIVE:-false}
      AIML_DRIFT_SCAN_ALL: ${AIML_DRIFT_SCAN_ALL:-false}
      AIML_INTAKE_RISK_LIVE_LIMIT: ${AIML_INTAKE_RISK_LIVE_LIMIT:-30}
      AIML_REPORT_LIVE_LIMIT: ${AIML_REPORT_LIVE_LIMIT:-10}
      AIML_REASONING_LIVE_LIMIT: ${AIML_REASONING_LIVE_LIMIT:-200}
      AIML_EMBEDDING_LIVE_LIMIT: ${AIML_EMBEDDING_LIVE_LIMIT:-200}
      AIML_RERANK_LIVE_LIMIT: ${AIML_RERANK_LIVE_LIMIT:-200}
      BAND_MODE: ${BAND_MODE:-lite}
      BAND_DEFAULT_ROOM_ID: ${BAND_DEFAULT_ROOM_ID:-}
      BAND_REST_URL: ${BAND_REST_URL:-https://app.band.ai/}
      BAND_WS_URL: ${BAND_WS_URL:-wss://app.band.ai/api/v1/socket/websocket}
      BAND_SERVICE_LIVE: ${BAND_SERVICE_LIVE:-false}
      BAND_SERVICE_HEARTBEAT_SECONDS: ${BAND_SERVICE_HEARTBEAT_SECONDS:-30}
      FEATHERLESS_API_KEY: ${FEATHERLESS_API_KEY:-}
      FEATHERLESS_BASE_URL: ${FEATHERLESS_BASE_URL:-https://api.featherless.ai/v1}
      FEATHERLESS_MODEL: ${FEATHERLESS_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      FEATHERLESS_MODE: ${FEATHERLESS_MODE:-lite}
      THENVOI_REST_URL: ${THENVOI_REST_URL:-https://app.band.ai/}
      THENVOI_WS_URL: ${THENVOI_WS_URL:-wss://app.band.ai/api/v1/socket/websocket}
    volumes:
      - ./agent_config.yaml:/app/agent_config.yaml:ro
      - ./output:/app/output
    command: python scripts/run_band_service.py
